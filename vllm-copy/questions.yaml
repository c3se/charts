questions:
  - variable: model.name
    label: "Model Name"
    description: "HuggingFace model ID to serve"
    type: string
    default: "mistralai/Mistral-7B-Instruct-v0.3"
    required: true

  - variable: resources.limits["nvidia.com/gpu"]
    label: "GPU Limit"
    description: "Number of GPUs per pod"
    type: enum
    options:
      - "1"
      - "2"
      - "4"
      - "8"
    default: "1"
    required: true
    
  - variable: storage.pvc
    label: "PVC name"
    description: "Name of the PVC for weight caching"
    type: string
    default: "vllm-cache"
    required: true

  - variable: storage.create
    label: "Create storage PVC"
    description: "Create a separate PVC for weight caching"
    type: boolean
    default: true
    required: true
    
  - variable: httpRoute.enabled
    label: "Enable HTTPRoute"
    description: "Create HTTPRoute for external access via gateway"
    type: boolean
    default: true
    show_subquestions_if: true
    subquestions:
      - variable: httpRoute.hostname
        label: "Hostname"
        description: "Hostname for the HTTPRoute"
        type: string
        default: "mistral.c3-staff.disa.chalmers.se"
        required: true
        show_if: "httpRoute.enabled=true"
