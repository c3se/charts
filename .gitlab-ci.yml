
pages:
  stage: deploy
  image: alpine:latest
  tags:
    - docker
  before_script:
    - apk add --no-cache helm
  script:
    - mkdir -p public
    - helm package ./vllm -d public
    - helm repo index public --url https://YOUR-USERNAME.gitlab.io/vllm-helm
  artifacts:
    paths:
      - public
  only:
    - main
